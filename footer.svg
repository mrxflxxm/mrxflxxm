<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 130" width="100%" height="130" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#3b0764"/>
      <stop offset="35%"  stop-color="#512BD4"/>
      <stop offset="65%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1e1b4b" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#4c1d95" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="sg">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <style>
      @keyframes tw { 0%,100% { opacity:0.15 } 50% { opacity:0.95 } }
      @keyframes tw2 { 0%,100% { opacity:0.05 } 50% { opacity:0.6  } }
    </style>
  </defs>

  <!-- back wave (depth layer) -->
  <path d="M0,100 C180,55 360,125 600,72 C780,38 980,105 1200,62 L1200,130 L0,130 Z"
        fill="url(#wg2)"/>

  <!-- main wave -->
  <path d="M0,90 C220,30 420,120 660,58 C820,18 1000,88 1200,48 L1200,130 L0,130 Z"
        fill="url(#wg)"/>

  <!-- wave crest highlight -->
  <path d="M0,90 C220,30 420,120 660,58 C820,18 1000,88 1200,48"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- soft glow blur copy -->
  <path d="M0,90 C220,30 420,120 660,58 C820,18 1000,88 1200,48"
        fill="none" stroke="rgba(192,132,252,0.25)" stroke-width="6"
        stroke-linecap="round" filter="url(#sg)"/>

  <!-- stars — large -->
  <circle cx="95"  cy="108" r="2.0" fill="white" style="animation:tw  2.1s 0.00s infinite"/>
  <circle cx="248" cy="62"  r="2.2" fill="white" style="animation:tw  1.8s 0.55s infinite"/>
  <circle cx="435" cy="118" r="1.8" fill="white" style="animation:tw  2.4s 1.10s infinite"/>
  <circle cx="590" cy="76"  r="2.0" fill="white" style="animation:tw  1.6s 0.30s infinite"/>
  <circle cx="740" cy="42"  r="2.3" fill="white" style="animation:tw  2.0s 0.80s infinite"/>
  <circle cx="870" cy="98"  r="1.9" fill="white" style="animation:tw  1.7s 1.40s infinite"/>
  <circle cx="1020" cy="65" r="2.1" fill="white" style="animation:tw  2.3s 0.20s infinite"/>
  <circle cx="1140" cy="88" r="1.8" fill="white" style="animation:tw  1.9s 0.95s infinite"/>

  <!-- stars — small -->
  <circle cx="160" cy="95"  r="1.2" fill="white" style="animation:tw2 2.6s 0.40s infinite"/>
  <circle cx="330" cy="115" r="1.3" fill="white" style="animation:tw2 1.9s 1.20s infinite"/>
  <circle cx="510" cy="90"  r="1.1" fill="white" style="animation:tw2 2.2s 0.70s infinite"/>
  <circle cx="680" cy="112" r="1.4" fill="white" style="animation:tw2 1.7s 0.05s infinite"/>
  <circle cx="810" cy="58"  r="1.2" fill="white" style="animation:tw2 2.5s 1.50s infinite"/>
  <circle cx="960" cy="108" r="1.3" fill="white" style="animation:tw2 2.0s 0.60s infinite"/>
  <circle cx="1080" cy="78" r="1.1" fill="white" style="animation:tw2 1.8s 1.00s infinite"/>
</svg>
